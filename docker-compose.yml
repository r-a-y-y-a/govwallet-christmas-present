version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: govtech-christmas-db
    environment:
      POSTGRES_DB: govtech_christmas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: govtech-christmas-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: govtech_christmas
      DB_USER: postgres
      DB_PASSWORD: password123
      APP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  postgres_data: